name: Schedule Istio Images Updater

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 4 * * *' # Run every day at 5:00 CET (4:00 UTC)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  discover-target-branches:
    name: Discover target branches
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build branch matrix
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

          latest_release="$(git for-each-ref --format='%(refname:short)' refs/remotes/origin/release-* \
            | sed 's#^origin/##' \
            | sort -V \
            | tail -n 1)"

          if [ -n "${latest_release}" ]; then
            matrix="{\"include\":[{\"base\":\"main\"},{\"base\":\"${latest_release}\"}]}"
          else
            matrix='{"include":[{"base":"main"}]}'
          fi

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  update-images:
    name: Update images on ${{ matrix.base }}
    runs-on: ubuntu-latest
    needs: discover-target-branches
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-target-branches.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ matrix.base }}
          fetch-depth: 0
      - name: Update external and FIPS images
        id: update
        shell: bash
        run: |
          set -euo pipefail
          bash ./hack/ci/update-istio-images.sh

          if git diff --quiet -- external-images.yaml fips-images.yaml; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo '## Automated Istio image update'
            echo
            echo "- Base branch: \`${{ matrix.base }}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '### Changelog'
            echo
            echo '```diff'
            git --no-pager diff -- external-images.yaml fips-images.yaml
            echo '```'
          } > image-update-changelog.md

          echo 'has_changes=true' >> "$GITHUB_OUTPUT"
      - name: Commit and create pull request
        if: steps.update.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          branch="autobump/istio-images-${{ matrix.base }}"
          title="chore: upgrade Istio external and FIPS images (${{ matrix.base }})"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${branch}"
          git add external-images.yaml fips-images.yaml
          git commit -m "chore: upgrade Istio external and FIPS images" -m "Generated by GitHub Actions"
          git push -f -u origin "${branch}"

          if gh pr view "${branch}" --json number >/dev/null 2>&1; then
            gh pr edit "${branch}" \
              --title "${title}" \
              --body-file image-update-changelog.md
          else
            gh pr create \
              --base "${{ matrix.base }}" \
              --head "${branch}" \
              --title "${title}" \
              --body-file image-update-changelog.md \
              --label area/ci \
              --label kind/chore
          fi
