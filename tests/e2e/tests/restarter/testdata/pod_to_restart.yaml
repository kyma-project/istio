apiVersion: v1
kind: Pod
metadata:
  generateName: fake-pod-to-restart-
  labels:
    app: fake-pod-to-restart
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: type
                operator: In
                values:
                  - kwok
  tolerations:
    - key: "kwok.x-k8s.io/node"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: fake-container
      image: fake-image