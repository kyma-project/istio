# permissions for end users to edit istio.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyma-istio-edit
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    kyma-project.io/managed-by: kyma
    kyma-project.io/module: istio
rules:
- apiGroups:
  - operator.kyma-project.io
  resources:
  - istios
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
  - deletecollection
- apiGroups:
  - operator.kyma-project.io
  resources:
  - istios/status
  verbs:
  - get
