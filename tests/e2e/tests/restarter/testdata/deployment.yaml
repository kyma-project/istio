apiVersion: apps/v1
kind: Deployment
metadata:
  generateName: fake-deployment-
  labels:
    app: fake-deployment
spec:
  replicas: 5
  selector:
    matchLabels:
      app: fake-deployment
  template:
    metadata:
      labels:
        app: fake-deployment
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - kwok
      tolerations:
        - key: "kwok.x-k8s.io/node"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: fake-container
          image: fake-image