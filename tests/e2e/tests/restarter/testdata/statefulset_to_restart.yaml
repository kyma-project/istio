apiVersion: apps/v1
kind: StatefulSet
metadata:
  generateName: fake-ss-to-restart-
  labels:
    app: fake-ss-to-restart
spec:
  replicas: 5
  selector:
    matchLabels:
      app: fake-ss-to-restart
  template:
    metadata:
      labels:
        app: fake-ss-to-restart
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - kwok
      tolerations:
        - key: "kwok.x-k8s.io/node"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: fake-container
          image: fake-image